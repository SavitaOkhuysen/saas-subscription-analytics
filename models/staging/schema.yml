version: 2

models:
  - name: stg_customers
    description: Cleaned and standardized customer records from telecom subscription data
    columns:
      - name: customer_id
        description: Unique identifier for each customer
        tests:
          - unique
          - not_null
      - name: gender
        description: Customer gender
        tests:
          - accepted_values:
              values: ['Male', 'Female']
      - name: contract_type
        description: Type of subscription contract
        tests:
          - not_null
          - accepted_values:
              values: ['Month-to-month', 'One year', 'Two year']
      - name: internet_type
        description: Type of internet service
        tests:
          - accepted_values:
              values: ['DSL', 'Fiber optic', 'No']
      - name: payment_method
        description: How the customer pays
        tests:
          - not_null
      - name: monthly_charges
        description: Monthly subscription amount
        tests:
          - not_null
      - name: tenure_months
        description: Number of months as a customer
        tests:
          - not_null
      - name: tenure_segment
        description: Customer tenure grouping
        tests:
          - accepted_values:
              values: ['New (0-12 months)', 'Mid (13-24 months)', 'Long-term (25+ months)']
